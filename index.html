<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>Regal Homes — Virtual Walkthrough</title>
    <meta
      name="description"
      content="Step inside a Regal home in your browser. No app, no agent, no appointment."
    />
    <link rel="preconnect" href="https://raw.githubusercontent.com" />
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        color: #fff;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
        touch-action: none;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        z-index: 10;
        transition: opacity 0.5s ease;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #loading-inner {
        text-align: center;
      }
      #loading-bar {
        width: min(60vw, 280px);
        height: 4px;
        background: #1f1f1f;
        border-radius: 2px;
        overflow: hidden;
        margin: 1rem auto 0;
      }
      #loading-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #b89766, #d4af7a);
        transition: width 0.2s ease;
      }
      #brand {
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #d4af7a;
      }
      #status {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: #888;
      }
      #hint {
        position: fixed;
        top: max(1rem, env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.65);
        background: rgba(0, 0, 0, 0.5);
        padding: 0.5rem 0.9rem;
        border-radius: 999px;
        backdrop-filter: blur(8px);
        z-index: 5;
        pointer-events: none;
        white-space: nowrap;
      }
      @media (max-width: 600px) {
        #hint {
          font-size: 0.7rem;
        }
      }
      #walk-btn {
        position: fixed;
        bottom: max(1.5rem, env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        width: 76px;
        height: 76px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.55);
        border: 2px solid rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        z-index: 5;
        display: none;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        transition: transform 0.08s ease, background 0.12s ease;
      }
      #walk-btn.visible {
        display: flex;
      }
      #walk-btn.active {
        background: rgba(212, 175, 122, 0.85);
        transform: translateX(-50%) scale(0.95);
      }
      #walk-btn svg {
        width: 32px;
        height: 32px;
        margin-bottom: 2px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
    </div>
    <div id="loading">
      <div id="loading-inner">
        <div id="brand">Regal Homes</div>
        <div id="loading-bar"><div id="loading-fill"></div></div>
        <div id="status">Loading walkthrough…</div>
      </div>
    </div>
    <div id="hint"></div>
    <button id="walk-btn" aria-label="Walk forward">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="12 4 12 20"></polyline>
        <polyline points="6 10 12 4 18 10"></polyline>
      </svg>
    </button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
